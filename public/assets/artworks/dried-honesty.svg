  <ellipse cx="90"  cy="235" rx="16" ry="20" fill="#f5f0ec" stroke="#c0b0a0" stroke-width="0.8" opacity="0.6"/>
  <ellipse cx="210" cy="195" rx="24" ry="30" fill="none" stroke="#c0b0a0" stroke-width="1.2" opacity="0.8"/>
  <ellipse cx="210" cy="195" rx="16" ry="20" fill="#f5f0ec" stroke="#c0b0a0" stroke-width="0.8" opacity="0.6"/>
  <ellipse cx="85"  cy="145" rx="22" ry="28" fill="none" stroke="#c0b0a0" stroke-width="1.2" opacity="0.8"/>
  <ellipse cx="85"  cy="145" rx="14" ry="18" fill="#f5f0ec" stroke="#c0b0a0" stroke-width="0.8" opacity="0.6"/>
  <ellipse cx="215" cy="115" rx="22" ry="28" fill="none" stroke="#c0b0a0" stroke-width="1.2" opacity="0.8"/>
  <ellipse cx="215" cy="115" rx="14" ry="18" fill="#f5f0ec" stroke="#c0b0a0" stroke-width="0.8" opacity="0.6"/>
  <ellipse cx="100" cy="78"  rx="18" ry="23" fill="none" stroke="#c0b0a0" stroke-width="1.2" opacity="0.7"/>
  <ellipse cx="100" cy="78"  rx="12" ry="15" fill="#f5f0ec" stroke="#c0b0a0" stroke-width="0.8" opacity="0.5"/>
