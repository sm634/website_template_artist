  <line x1="210" y1="165" x2="210" y2="225" stroke="#b0a090" stroke-width="0.6" opacity="0.5"/>
  <text x="150" y="396" font-family="Georgia, serif" font-size="10" fill="#9a8070" text-anchor="middle" opacity="0.6">Dried Honesty — placeholder</text>
</svg>
