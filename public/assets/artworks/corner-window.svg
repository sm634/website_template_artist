<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 400" width="340" height="400">
  <rect width="340" height="400" fill="#f8f6f2"/>
  <!-- Wall -->
  <rect width="340" height="400" fill="#f0ece4" opacity="0.8"/>
  <!-- Corner line -->
  <line x1="170" y1="0" x2="170" y2="400" stroke="#d8d0c0" stroke-width="1.5"/>
  <!-- Left window frame -->
  <rect x="30"  y="60" width="120" height="160" fill="#dce8f0" opacity="0.9" stroke="#c0c0b0" stroke-width="1"/>
  <line x1="90"  y1="60"  x2="90"  y2="220" stroke="#c0c0b0" stroke-width="0.8"/>
  <line x1="30"  y1="140" x2="150" y2="140" stroke="#c0c0b0" stroke-width="0.8"/>
  <!-- Right window frame -->
  <rect x="190" y="60" width="120" height="160" fill="#dce8f0" opacity="0.9" stroke="#c0c0b0" stroke-width="1"/>
  <line x1="250" y1="60"  x2="250" y2="220" stroke="#c0c0b0" stroke-width="0.8"/>
  <line x1="190" y1="140" x2="310" y2="140" stroke="#c0c0b0" stroke-width="0.8"/>
  <!-- Light cast on wall -->
  <rect x="30" y="220" width="120" height="30" fill="#f5e8c0" opacity="0.35"/>
  <rect x="190" y="220" width="120" height="30" fill="#f5e8c0" opacity="0.35"/>
  <!-- Plant silhouette -->
  <ellipse cx="130" cy="310" rx="35" ry="45" fill="#8aaa70" opacity="0.25"/>
  <ellipse cx="118" cy="295" rx="20" ry="28" fill="#7a9a60" opacity="0.2"/>
  <ellipse cx="145" cy="300" rx="22" ry="30" fill="#8aaa70" opacity="0.2"/>
  <line x1="130" y1="355" x2="130" y2="340" stroke="#8aaa70" stroke-width="1.5" opacity="0.4"/>
  <!-- Plant shadow on wall -->
  <ellipse cx="100" cy="248" rx="40" ry="12" fill="#8aaa70" opacity="0.08" transform="skewX(-10)"/>
  <text x="170" y="393" font-family="Georgia, serif" font-size="10" fill="#908070" text-anchor="middle" opacity="0.6">Corner Window — placeholder</text>
</svg>
