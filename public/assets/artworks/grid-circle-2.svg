<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <rect width="300" height="300" fill="#f4f4f2"/>
  <!-- Grid lines -->
  <line x1="50"  y1="50"  x2="250" y2="50"  stroke="#c0c0bc" stroke-width="0.6"/>
  <line x1="50"  y1="100" x2="250" y2="100" stroke="#c0c0bc" stroke-width="0.6"/>
  <line x1="50"  y1="150" x2="250" y2="150" stroke="#c0c0bc" stroke-width="0.6"/>
  <line x1="50"  y1="200" x2="250" y2="200" stroke="#c0c0bc" stroke-width="0.6"/>
  <line x1="50"  y1="250" x2="250" y2="250" stroke="#c0c0bc" stroke-width="0.6"/>
  <line x1="50"  y1="50"  x2="50"  y2="250" stroke="#c0c0bc" stroke-width="0.6"/>
  <line x1="100" y1="50"  x2="100" y2="250" stroke="#c0c0bc" stroke-width="0.6"/>
  <line x1="150" y1="50"  x2="150" y2="250" stroke="#c0c0bc" stroke-width="0.6"/>
